<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Healthforce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #171717;
      --surface-2: #262626;
      --border: #2a2a2a;
      --accent: #D4FF3D;
      --accent-2: #C5B5F5;
      --accent-3: #F5C8E0;
      --text: #FAFAFA;
      --text-2: #A3A3A3;
      --text-3: #737373;
      --success: #22C55E;
      --danger: #EF4444;
      --radius-sm: 12px;
      --radius: 20px;
      --radius-lg: 28px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body { padding-bottom: 100px; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input, select, textarea { font-family: inherit; }

    .screen { display: none; max-width: 600px; margin: 0 auto; padding: 24px 20px 0; }
    .screen.active { display: block; }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; }
    .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
    .subtitle { color: var(--text-2); font-size: 13px; margin-top: 2px; }

    .btn-log-training { background: var(--accent); color: #000; padding: 10px 16px; border-radius: 100px; font-weight: 700; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.15s; flex-shrink: 0; }
    .btn-log-training:active { opacity: 0.85; }
    .btn-log-training svg { width: 14px; height: 14px; }

    .week-cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 20px; }
    .cal-day { background: var(--surface); border-radius: var(--radius-sm); padding: 12px 4px; text-align: center; border: 1px solid var(--border); position: relative; cursor: pointer; transition: transform 0.1s; }
    .cal-day:active { transform: scale(0.95); }
    .cal-day .label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 4px; }
    .cal-day .num { font-size: 16px; font-weight: 700; }
    .cal-day.today { background: var(--accent); color: #000; border-color: var(--accent); }
    .cal-day.today .label { color: rgba(0,0,0,0.6); }
    .cal-day.completed::after { content: '✓'; position: absolute; top: 4px; right: 4px; width: 16px; height: 16px; border-radius: 50%; background: var(--success); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

    .hero { background: var(--accent); color: #000; border-radius: var(--radius-lg); padding: 24px; margin-bottom: 14px; cursor: pointer; transition: transform 0.1s; }
    .hero:active { transform: scale(0.99); }
    .hero .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; margin-bottom: 8px; }
    .hero h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; line-height: 1.2; }
    .hero p { font-size: 13px; opacity: 0.75; }

    .progress-card { background: var(--surface); border-radius: var(--radius); padding: 18px; border: 1px solid var(--border); margin-bottom: 14px; }
    .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
    .progress-title { font-size: 13px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; }
    .progress-value { font-size: 18px; font-weight: 800; }
    .progress-bar { height: 8px; background: var(--surface-2); border-radius: 100px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width 0.3s ease; }

    .section-title { font-size: 18px; font-weight: 700; margin: 24px 0 12px; letter-spacing: -0.01em; }
    .day-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .day-card { background: var(--surface); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); cursor: pointer; transition: transform 0.1s, border-color 0.15s; position: relative; }
    .day-card:active { transform: scale(0.98); border-color: var(--accent); }
    .day-card.completed { border-color: var(--success); }
    .day-card.completed::after { content: '✓'; position: absolute; top: 14px; right: 14px; width: 24px; height: 24px; border-radius: 50%; background: var(--success); color: #fff; font-weight: 800; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    .day-label { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .day-name { font-size: 15px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.01em; line-height: 1.3; padding-right: 30px; }
    .muscles { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; background: var(--surface-2); color: var(--text-2); }

    .nav { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: var(--surface); border-radius: 100px; padding: 6px; display: flex; gap: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 100; border: 1px solid var(--border); }
    .nav-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-2); transition: all 0.2s; }
    .nav-btn.active { background: var(--accent); color: #000; }
    .nav-btn svg { width: 22px; height: 22px; }

    .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-weight: 600; font-size: 14px; margin-bottom: 14px; }

    .day-type-switcher { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; }
    .day-type-switcher label { display: block; font-size: 11px; color: var(--text-2); font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .day-type-switcher select { width: 100%; background: var(--surface-2); border: none; border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; font-weight: 600; }

    .add-exercise-btn { background: transparent; border: 2px dashed var(--border); border-radius: var(--radius); padding: 14px; width: 100%; color: var(--text-2); font-size: 14px; font-weight: 600; margin-bottom: 14px; }
    .add-exercise-btn:hover { border-color: var(--accent); color: var(--accent); }

    .exercise-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .exercise-card { background: var(--surface); border-radius: var(--radius); padding: 14px; border: 1px solid var(--border); }
    .exercise-card.superset { border-color: var(--accent-2); }
    .exercise-header { display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; gap: 12px; }
    .exercise-info { flex: 1; min-width: 0; }
    .exercise-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.01em; line-height: 1.3; }
    .exercise-meta { font-size: 12px; color: var(--text-2); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .ss-tag { background: var(--accent-2); color: #000; padding: 2px 8px; border-radius: 100px; font-weight: 700; font-size: 10px; }
    .exercise-meta .note { color: var(--text-3); font-style: italic; }
    .exercise-collapse { width: 30px; height: 30px; border-radius: 50%; background: var(--surface-2); display: flex; align-items: center; justify-content: center; transition: transform 0.2s; flex-shrink: 0; }
    .exercise-card.expanded .exercise-collapse { transform: rotate(180deg); }
    .exercise-body { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .exercise-card.expanded .exercise-body { display: block; }

    .exercise-actions { display: flex; gap: 6px; margin-bottom: 10px; }
    .ex-action-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--surface-2); color: var(--text-2); display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .ex-action-btn:active { background: #2e2e2e; }
    .ex-action-btn.danger { color: var(--danger); margin-left: auto; }
    .ex-action-btn svg { width: 16px; height: 16px; }
    .ex-action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .sets-table-header { display: grid; grid-template-columns: 32px 1fr 1fr 1fr 32px; gap: 8px; padding: 4px 0 8px; font-size: 10px; color: var(--text-3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .set-row { display: grid; grid-template-columns: 32px 1fr 1fr 1fr 32px; gap: 8px; padding: 6px 0; align-items: center; }
    .set-num { font-size: 13px; font-weight: 700; text-align: center; color: var(--text-2); }
    .set-input, .rpe-select { background: var(--surface-2); border: 1px solid transparent; border-radius: 10px; padding: 10px; text-align: center; font-size: 14px; color: var(--text); width: 100%; font-weight: 600; }
    .set-input:focus, .rpe-select:focus { outline: none; border-color: var(--accent); }
    .remove-set { width: 32px; height: 32px; border-radius: 50%; background: var(--surface-2); color: var(--danger); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; }
    .add-set-btn { width: 100%; padding: 10px; background: var(--surface-2); border-radius: 10px; color: var(--text-2); font-size: 13px; font-weight: 600; margin-top: 8px; }

    .btn { background: var(--accent); color: #000; padding: 14px 24px; border-radius: 100px; font-weight: 700; font-size: 15px; width: 100%; transition: opacity 0.15s; }
    .btn:active { opacity: 0.85; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: none; }
    .modal-overlay.open { display: flex; align-items: flex-end; }
    @media (min-width: 640px) { .modal-overlay.open { align-items: center; } }
    .modal { background: var(--surface); border-radius: var(--radius-lg) var(--radius-lg) 0 0; width: 100%; max-width: 600px; margin: 0 auto; max-height: 90vh; overflow-y: auto; padding: 24px; }
    @media (min-width: 640px) { .modal { border-radius: var(--radius-lg); } }
    .modal h2 { font-size: 20px; font-weight: 800; margin-bottom: 16px; letter-spacing: -0.02em; }

    .form-field { margin-bottom: 14px; }
    .form-field label { display: block; font-size: 11px; color: var(--text-2); font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-field input, .form-field select { width: 100%; background: var(--surface-2); border: 1px solid transparent; border-radius: 12px; padding: 12px; color: var(--text); font-size: 15px; }
    .form-field input:focus, .form-field select:focus { outline: none; border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .modal-actions .btn { flex: 1; }

    .ex-pick-item { background: var(--surface-2); border-radius: 12px; padding: 12px 14px; margin-bottom: 6px; cursor: pointer; transition: background 0.15s; }
    .ex-pick-item:active { background: #333; }
    .ex-pick-item .name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .ex-pick-item .meta { font-size: 11px; color: var(--text-2); }

    .history-item { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; border: 1px solid var(--border); }
    .history-date { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .history-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.01em; }
    .history-stats { font-size: 13px; color: var(--text-2); }

    .range-pills { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .range-pills::-webkit-scrollbar { display: none; }
    .range-pill { flex-shrink: 0; padding: 8px 14px; border-radius: 100px; background: var(--surface); color: var(--text-2); font-size: 13px; font-weight: 600; border: 1px solid var(--border); white-space: nowrap; }
    .range-pill.active { background: var(--accent); color: #000; border-color: var(--accent); }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--surface); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); }
    .stat-card.accent { background: var(--accent-2); color: #000; border-color: var(--accent-2); }
    .stat-card.accent-3 { background: var(--accent-3); color: #000; border-color: var(--accent-3); }
    .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; margin-bottom: 4px; }
    .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
    .stat-meta { font-size: 11px; color: var(--text-2); margin-top: 4px; }
    .stat-card.accent .stat-meta, .stat-card.accent-3 .stat-meta { color: rgba(0,0,0,0.6); }

    .chart-card { background: var(--surface); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); margin-bottom: 12px; }
    .chart-card h3 { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
    .chart-container { position: relative; height: 220px; }

    .empty { text-align: center; padding: 40px 20px; color: var(--text-3); font-size: 14px; }

    .cardio-prescription { background: var(--accent-2); color: #000; border-radius: var(--radius); padding: 20px; margin-bottom: 14px; }
    .cardio-prescription .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.65; margin-bottom: 6px; }
    .cardio-prescription .value { font-size: 22px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.01em; line-height: 1.2; }
    .cardio-prescription .meta { font-size: 13px; opacity: 0.7; }
    .cardio-log-form { background: var(--surface); border-radius: var(--radius); padding: 18px; border: 1px solid var(--border); margin-bottom: 16px; }

    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 12px 20px; border-radius: 100px; font-weight: 700; font-size: 14px; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    @media (min-width: 640px) {
      .day-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<section class="screen active" id="screen-home">
  <div class="header">
    <div>
      <div class="subtitle" id="home-greeting">Hola, Mariano</div>
      <h1>Healthforce</h1>
    </div>
    <button class="btn-log-training" onclick="showLogTrainingModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Log Training
    </button>
  </div>

  <div class="week-cal" id="week-cal"></div>

  <div class="hero" id="hero-today" onclick="openToday()">
    <div class="label">Hoy</div>
    <h2 id="hero-name">—</h2>
    <p id="hero-desc">—</p>
  </div>

  <div class="progress-card">
    <div class="progress-header">
      <span class="progress-title">Esta semana</span>
      <span class="progress-value" id="week-progress-text">0 / 6</span>
    </div>
    <div class="progress-bar">
      <div class="progress-bar-fill" id="week-progress-fill" style="width: 0%"></div>
    </div>
  </div>

  <h3 class="section-title">Tu split</h3>
  <div class="day-grid" id="day-grid"></div>
</section>

<section class="screen" id="screen-day">
  <button class="back-btn" onclick="showScreen('home')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"/></svg>
    Volver
  </button>
  <div class="header">
    <div>
      <div class="subtitle" id="day-date">—</div>
      <h1 id="day-title">—</h1>
    </div>
  </div>
  <div class="day-type-switcher">
    <label>Tipo de entrenamiento</label>
    <select id="day-type-select" onchange="switchDayType(this.value)"></select>
  </div>
  <div id="day-content"></div>
</section>

<section class="screen" id="screen-history">
  <div class="header"><h1>Historial</h1></div>
  <div id="history-list"></div>
</section>

<section class="screen" id="screen-analytics">
  <div class="header"><h1>Stats</h1></div>
  <div class="range-pills" id="range-pills">
    <button class="range-pill active" data-range="week-mon">Lun → hoy</button>
    <button class="range-pill" data-range="7d">Últimos 7d</button>
    <button class="range-pill" data-range="month">Mes → hoy</button>
    <button class="range-pill" data-range="30d">Últimos 30d</button>
    <button class="range-pill" data-range="ytd">YTD</button>
  </div>
  <div id="analytics-content"></div>
</section>

<nav class="nav">
  <button class="nav-btn active" data-screen="home" title="Inicio">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </button>
  <button class="nav-btn" data-screen="history" title="Historial">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
  </button>
  <button class="nav-btn" data-screen="analytics" title="Stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
  </button>
</nav>

<!-- LOG TRAINING MODAL -->
<div class="modal-overlay" id="modal-log-training">
  <div class="modal">
    <h2>Log entrenamiento</h2>
    <div class="form-field">
      <label>Fecha</label>
      <input type="date" id="log-date">
    </div>
    <div class="form-field">
      <label>Tipo de entrenamiento</label>
      <select id="log-type"></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-log-training')">Cancelar</button>
      <button class="btn" onclick="confirmLogTraining()">Comenzar</button>
    </div>
  </div>
</div>

<!-- ADD EXERCISE TO CATALOG MODAL (solo se abre desde dentro del día) -->
<div class="modal-overlay" id="modal-add-exercise">
  <div class="modal">
    <h2>Agregar ejercicio nuevo</h2>
    <div class="form-field">
      <label>Nombre</label>
      <input type="text" id="ex-name" placeholder="ej: Press inclinado">
    </div>
    <div class="form-field">
      <label>Músculo primario (opcional)</label>
      <select id="ex-primary">
        <option value="">—</option>
        <option>Pecho</option><option>Espalda</option><option>Hombros</option>
        <option>Bíceps</option><option>Tríceps</option><option>Piernas</option>
        <option>Glúteos</option><option>Pantorrillas</option><option>Core</option><option>Cardio</option>
      </select>
    </div>
    <div class="form-field">
      <label>Músculo secundario (opcional)</label>
      <select id="ex-secondary">
        <option value="">—</option>
        <option>Pecho</option><option>Espalda</option><option>Hombros</option>
        <option>Bíceps</option><option>Tríceps</option><option>Piernas</option>
        <option>Glúteos</option><option>Pantorrillas</option><option>Core</option><option>Cardio</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-add-exercise')">Cancelar</button>
      <button class="btn" onclick="saveManualExercise()">Guardar y agregar al día</button>
    </div>
  </div>
</div>

<!-- PICK EXERCISE MODAL -->
<div class="modal-overlay" id="modal-pick-exercise">
  <div class="modal">
    <h2>Agregar ejercicio al día</h2>
    <div class="form-field">
      <label>Buscar</label>
      <input type="text" id="ex-search" placeholder="Buscar ejercicio..." oninput="filterPickExercises()">
    </div>
    <div id="ex-search-results" style="max-height: 50vh; overflow-y: auto;"></div>
    <button class="btn btn-secondary" style="margin-top: 12px;" onclick="closeModal('modal-pick-exercise'); showAddExerciseModal();">+ No lo encuentro, agregar nuevo</button>
    <button class="btn btn-secondary" style="margin-top: 8px;" onclick="closeModal('modal-pick-exercise')">Cerrar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAY_TEMPLATES = [
  { type_id: 'day3', name: 'Día 3 — Piernas', short: 'Día 3', desc: 'Funcional, no hipertrofia', category: 'strength', weekday: 1, muscles: ['Piernas','Glúteos','Pantorrillas'] },
  { type_id: 'day4', name: 'Día 4 — Pecho horizontal · Espalda · Brazos', short: 'Día 4', desc: 'Segundo upper, complementario', category: 'strength', weekday: 2, muscles: ['Pecho','Espalda','Brazos'] },

const STORAGE_KEYS = {
  workouts: 'hf_workouts',
  userExercises: 'hf_user_exercises',
  userState: 'hf_user_state',
  draftWorkouts: 'hf_draft_workouts'
};

function loadWorkouts() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.workouts) || '[]'); }
function saveWorkouts(arr) { localStorage.setItem(STORAGE_KEYS.workouts, JSON.stringify(arr)); }
function loadUserExercises() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.userExercises) || '[]'); }
function saveUserExercises(arr) { localStorage.setItem(STORAGE_KEYS.userExercises, JSON.stringify(arr)); }
function loadUserState() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.userState) || '{"current_week": 1, "plan_started_at": null}'); }
function saveUserState(s) { localStorage.setItem(STORAGE_KEYS.userState, JSON.stringify(s)); }
function loadDraftMap() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.draftWorkouts) || '{}'); }
function loadDraft(typeId, dateStr) { return loadDraftMap()[`${typeId}-${dateStr}`] || null; }
function saveDraft(typeId, dateStr, draft) {
  const drafts = loadDraftMap();
  drafts[`${typeId}-${dateStr}`] = draft;
  localStorage.setItem(STORAGE_KEYS.draftWorkouts, JSON.stringify(drafts));
}
function clearDraft(typeId, dateStr) {
  const drafts = loadDraftMap();
  delete drafts[`${typeId}-${dateStr}`];
  localStorage.setItem(STORAGE_KEYS.draftWorkouts, JSON.stringify(drafts));
}

function getAllExercises() { return [...EXERCISES_BASE, ...loadUserExercises()]; }
function findExercise(id) { return getAllExercises().find(e => e.id === id); }
function getExerciseMeta(typeId, exId) { return (DAY_EXERCISES[typeId] || []).find(p => p.id === exId); }
function todayStr() { return dateToISO(new Date()); }
function dateToISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function getWeekStart(d) {
  const dt = new Date(d);
  const day = dt.getDay() === 0 ? 7 : dt.getDay();
  dt.setDate(dt.getDate() - day + 1);
  dt.setHours(0,0,0,0);
  return dt;
}
function getWeekday(d) {
  const dt = new Date(d);
  return dt.getDay() === 0 ? 7 : dt.getDay();
}
function dayShortName(weekday) { return ['LUN','MAR','MIE','JUE','VIE','SAB','DOM'][weekday-1]; }
function templatesForWeekday(weekday) { return DAY_TEMPLATES.filter(t => t.weekday === weekday); }
function workoutsForDate(dateStr) { return loadWorkouts().filter(w => w.date === dateStr); }
function workoutForTypeAndDate(typeId, dateStr) { return loadWorkouts().find(w => w.type_id === typeId && w.date === dateStr); }
function workoutsThisWeek() {
  const ws = getWeekStart(new Date());
  const we = new Date(ws);
  we.setDate(we.getDate() + 7);
  return loadWorkouts().filter(w => {
    const wd = new Date(w.date + 'T12:00:00');
    return wd >= ws && wd < we;
  });
}

// =============== HOME ===============
function renderHome() {
  const today = new Date();
  const hour = today.getHours();
  let greeting = 'Buenos días, Mariano';
  if (hour >= 12 && hour < 19) greeting = 'Buenas tardes, Mariano';
  if (hour >= 19 || hour < 6) greeting = 'Buenas noches, Mariano';
  document.getElementById('home-greeting').textContent = greeting;

  const ws = getWeekStart(today);
  const calEl = document.getElementById('week-cal');
  calEl.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws);
    d.setDate(d.getDate() + i);
    const dateStr = dateToISO(d);
    const isToday = dateStr === todayStr();
    const completed = workoutsForDate(dateStr).length > 0;
    const div = document.createElement('div');
    div.className = 'cal-day' + (isToday ? ' today' : '') + (completed ? ' completed' : '');
    div.innerHTML = `<div class="label">${dayShortName(i+1)}</div><div class="num">${d.getDate()}</div>`;
    div.onclick = () => {
      const tpls = templatesForWeekday(i+1);
      if (tpls.length) openDay(tpls[0].type_id, dateStr);
    };
    calEl.appendChild(div);
  }

  const todayWeekday = getWeekday(today);
  const todayTpls = templatesForWeekday(todayWeekday);
  if (todayTpls.length) {
    document.getElementById('hero-name').textContent = todayTpls[0].name;
    document.getElementById('hero-desc').textContent = todayTpls[0].desc;
  } else {
    document.getElementById('hero-name').textContent = 'Día libre';
    document.getElementById('hero-desc').textContent = 'Descanso o movilidad ligera';
  }

  const weekWorkouts = workoutsThisWeek();
  const daysWithSession = new Set(weekWorkouts.map(w => w.date)).size;
  document.getElementById('week-progress-text').textContent = `${daysWithSession} / ${WEEK_TARGET}`;
  document.getElementById('week-progress-fill').style.width = Math.min(100, (daysWithSession / WEEK_TARGET) * 100) + '%';

  const gridEl = document.getElementById('day-grid');
  gridEl.innerHTML = '';
  DAY_TEMPLATES.forEach(tpl => {
    const wsDate = new Date(ws);
    wsDate.setDate(wsDate.getDate() + (tpl.weekday - 1));
    const dateStr = dateToISO(wsDate);
    const isCompleted = !!workoutForTypeAndDate(tpl.type_id, dateStr);
    const card = document.createElement('div');
    card.className = 'day-card' + (isCompleted ? ' completed' : '');
    card.innerHTML = `
      <div class="day-label">${dayShortName(tpl.weekday)} · ${tpl.short}</div>
      <div class="day-name">${tpl.name}</div>
      <div class="muscles">${tpl.muscles.map(m => `<span class="badge">${m}</span>`).join('')}</div>
    `;
    card.onclick = () => openDay(tpl.type_id, dateStr);
    gridEl.appendChild(card);
  });
}

function openToday() {
  const tpls = templatesForWeekday(getWeekday(new Date()));
  if (tpls.length) openDay(tpls[0].type_id, todayStr());
}

// =============== DAY ===============
function openDay(typeId, dateStr) {
  currentDayTypeId = typeId;
  currentDayDate = dateStr;
  showScreen('day');
  const tpl = DAY_TEMPLATES.find(t => t.type_id === typeId);
  document.getElementById('day-title').textContent = tpl.name;
  const d = new Date(dateStr + 'T12:00:00');
  document.getElementById('day-date').textContent = d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });

  // Type switcher
  const typeSel = document.getElementById('day-type-select');
  typeSel.innerHTML = DAY_TEMPLATES.map(t => `<option value="${t.type_id}" ${t.type_id === typeId ? 'selected' : ''}>${t.name}</option>`).join('');

  if (tpl.category === 'strength') renderStrengthDay(typeId, dateStr);
  else if (typeId === 'sprints') renderSprintsDay(dateStr);
  else if (typeId === 'z2') renderZ2Day(dateStr);
  else renderSimpleCardio(typeId, dateStr);
}

function switchDayType(newTypeId) {
  if (newTypeId === currentDayTypeId) return;
  // Auto-save del current_draft ya está hecho a cada cambio de input.
  openDay(newTypeId, currentDayDate);
}

function loadOrCreateDraft(typeId, dateStr, factory) {
  let draft = loadDraft(typeId, dateStr);
  if (!draft) {
    const existing = workoutForTypeAndDate(typeId, dateStr);
    if (existing) draft = JSON.parse(JSON.stringify(existing));
  }
  if (!draft) draft = factory();
  return draft;
}

function renderStrengthDay(typeId, dateStr) {
  const prescribed = DAY_EXERCISES[typeId] || [];
  const draft = loadOrCreateDraft(typeId, dateStr, () => {
    const d = { type_id: typeId, date: dateStr, sets: {}, exercise_order: [] };
    prescribed.forEach(p => {
      d.exercise_order.push(p.id);
      d.sets[p.id] = Array.from({length: p.sets}, (_, i) => ({ set_number: i+1, weight: '', reps: '', rpe: '' }));
    });
    return d;
  });

  // Migrar drafts viejos (pre-exercise_order)
  if (!draft.exercise_order) {
    draft.exercise_order = [];
    prescribed.forEach(p => { if (!draft.exercise_order.includes(p.id)) draft.exercise_order.push(p.id); });
    (draft.extra_exercises || []).forEach(id => { if (!draft.exercise_order.includes(id)) draft.exercise_order.push(id); });
  }
  if (!draft.sets) draft.sets = {};

  // Asegurar que cada ejercicio tenga sus filas iniciales
  draft.exercise_order.forEach(exId => {
    const meta = getExerciseMeta(typeId, exId);
    const expectedSets = meta ? meta.sets : 1;
    if (!draft.sets[exId] || !draft.sets[exId].length) {
      draft.sets[exId] = Array.from({length: expectedSets}, (_, i) => ({ set_number: i+1, weight: '', reps: '', rpe: '' }));
    }
  });

  currentDraft = draft;
  saveDraft(typeId, dateStr, draft);

  const content = document.getElementById('day-content');
  let html = '<button class="add-exercise-btn" onclick="showPickExerciseModal()">+ Agregar ejercicio</button>';
  html += '<div class="exercise-list">';

  draft.exercise_order.forEach((exId, idx) => {
    const ex = findExercise(exId);
    if (!ex) return;
    const meta = getExerciseMeta(typeId, exId);
    const sets = draft.sets[exId] || [];
    const ssTag = meta && meta.ss_group ? `<span class="ss-tag">SS${meta.ss_group}</span>` : '';
    const isFirst = idx === 0;
    const isLast = idx === draft.exercise_order.length - 1;
    const metaLine = meta
      ? `${ssTag}<span>${meta.sets}×${meta.reps}</span>${meta.rir ? `<span>· ${meta.rir}</span>` : ''}${meta.notes ? `<span class="note">${meta.notes}</span>` : ''}`
      : `<span class="badge">extra</span><span>${ex.primary || ''}</span>`;
    html += `
      <div class="exercise-card${meta && meta.ss_group ? ' superset' : ''}" data-exid="${exId}">
        <div class="exercise-header" onclick="toggleExercise('${exId}')">
          <div class="exercise-info">
            <div class="exercise-name">${ex.name}</div>
            <div class="exercise-meta">${metaLine}</div>
          </div>
          <div class="exercise-collapse"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg></div>
        </div>
        <div class="exercise-body">
          <div class="exercise-actions">
            <button class="ex-action-btn" onclick="moveExercise('${exId}', -1)" ${isFirst ? 'disabled' : ''} title="Subir">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg>
            </button>
            <button class="ex-action-btn" onclick="moveExercise('${exId}', 1)" ${isLast ? 'disabled' : ''} title="Bajar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <button class="ex-action-btn danger" onclick="removeExerciseFromDay('${exId}')" title="Quitar del día">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 01-2 2H9a2 2 0 01-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </button>
          </div>
          <div class="sets-table-header"><span>#</span><span>Peso (kg)</span><span>Reps</span><span>RPE</span><span></span></div>
          <div class="sets-list" id="sets-${exId}">${renderSets(exId, sets)}</div>
          <button class="add-set-btn" onclick="addSet('${exId}')">+ Agregar serie</button>
        </div>
      </div>
    `;
  });

  html += '</div>';
  if (!draft.exercise_order.length) {
    html += '<div class="empty">No hay ejercicios cargados. Tocá "+ Agregar ejercicio" arriba.</div>';
  }
  html += `<button class="btn" onclick="finishWorkout()">Finalizar entrenamiento</button>`;
  content.innerHTML = html;

  const firstCard = content.querySelector('.exercise-card');
  if (firstCard) firstCard.classList.add('expanded');
}

function renderSets(exId, sets) {
  return sets.map((s, idx) => `
    <div class="set-row">
      <span class="set-num">${s.set_number}</span>
      <input type="number" class="set-input" placeholder="kg" value="${s.weight ?? ''}" onchange="updateSet('${exId}', ${idx}, 'weight', this.value)" inputmode="decimal" step="0.5">
      <input type="number" class="set-input" placeholder="reps" value="${s.reps ?? ''}" onchange="updateSet('${exId}', ${idx}, 'reps', this.value)" inputmode="numeric">
      <select class="rpe-select" onchange="updateSet('${exId}', ${idx}, 'rpe', this.value)">
        <option value="">—</option>
        ${[1,2,3,4,5].map(r => `<option value="${r}" ${s.rpe == r ? 'selected' : ''}>${r}</option>`).join('')}
      </select>
      <button class="remove-set" onclick="removeSet('${exId}', ${idx})">×</button>
    </div>
  `).join('');
}

function toggleExercise(exId) {
  const card = document.querySelector(`.exercise-card[data-exid="${exId}"]`);
  if (card) card.classList.toggle('expanded');
}
function updateSet(exId, idx, field, val) {
  if (!currentDraft.sets[exId]) currentDraft.sets[exId] = [];
  if (!currentDraft.sets[exId][idx]) currentDraft.sets[exId][idx] = { set_number: idx+1 };
  currentDraft.sets[exId][idx][field] = val;
  saveDraft(currentDayTypeId, currentDayDate, currentDraft);
}
function addSet(exId) {
  if (!currentDraft.sets[exId]) currentDraft.sets[exId] = [];
  const arr = currentDraft.sets[exId];
  arr.push({ set_number: arr.length + 1, weight: '', reps: '', rpe: '' });
  saveDraft(currentDayTypeId, currentDayDate, currentDraft);
  document.getElementById('sets-' + exId).innerHTML = renderSets(exId, arr);
}
function removeSet(exId, idx) {
  const arr = currentDraft.sets[exId];
  arr.splice(idx, 1);
  arr.forEach((s, i) => s.set_number = i + 1);
  saveDraft(currentDayTypeId, currentDayDate, currentDraft);
  document.getElementById('sets-' + exId).innerHTML = renderSets(exId, arr);
}
function moveExercise(exId, delta) {
  const order = currentDraft.exercise_order;
  const idx = order.indexOf(exId);
  if (idx < 0) return;
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= order.length) return;
  [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
  saveDraft(currentDayTypeId, currentDayDate, currentDraft);
  renderStrengthDay(currentDayTypeId, currentDayDate);
}
function removeExerciseFromDay(exId) {
  if (!confirm('¿Quitar este ejercicio del día?')) return;
  currentDraft.exercise_order = currentDraft.exercise_order.filter(id => id !== exId);
  delete currentDraft.sets[exId];
  saveDraft(currentDayTypeId, currentDayDate, currentDraft);
  renderStrengthDay(currentDayTypeId, currentDayDate);
}

// =============== CARDIO ===============
function getCurrentWeek() { return loadUserState().current_week || 1; }

function renderSprintsDay(dateStr) {
  const week = getCurrentWeek();
  const prescription = CARDIO_PROGRESSION.sprints.find(p => p.week === week) || CARDIO_PROGRESSION.sprints[CARDIO_PROGRESSION.sprints.length - 1];
  const draft = loadOrCreateDraft('sprints', dateStr, () => ({ type_id: 'sprints', date: dateStr, velocity: '', rounds_completed: '', series_completed: '', rpe: '', notes: '' }));
  currentDraft = draft;
  saveDraft('sprints', dateStr, draft);

  document.getElementById('day-content').innerHTML = `
    <div class="cardio-prescription">
      <div class="label">Plan de hoy · Semana ${week}${prescription.deload ? ' (deload)' : ''}</div>
      <div class="value">${prescription.series} × ${prescription.rounds} rondas a ${prescription.velocity} km/h</div>
      <div class="meta">Formato 20" / 10" · inclinación 1°</div>
    </div>
    <div class="cardio-log-form">
      <div class="form-field"><label>Velocidad real (km/h)</label><input type="number" step="0.1" value="${draft.velocity ?? prescription.velocity}" onchange="updateCardio('velocity', this.value)"></div>
      <div class="form-field"><label>Series completadas (de ${prescription.series})</label><input type="number" value="${draft.series_completed ?? ''}" placeholder="${prescription.series}" onchange="updateCardio('series_completed', this.value)"></div>
      <div class="form-field"><label>Rondas última serie (de ${prescription.rounds})</label><input type="number" value="${draft.rounds_completed ?? ''}" placeholder="${prescription.rounds}" onchange="updateCardio('rounds_completed', this.value)"></div>
      <div class="form-field"><label>RPE 1-5</label><select onchange="updateCardio('rpe', this.value)"><option value="">—</option>${[1,2,3,4,5].map(r => `<option value="${r}" ${draft.rpe == r ? 'selected' : ''}>${r}</option>`).join('')}</select></div>
      <div class="form-field"><label>Notas (opcional)</label><input type="text" value="${draft.notes ?? ''}" onchange="updateCardio('notes', this.value)"></div>
    </div>
    <button class="btn" onclick="finishWorkout()">Finalizar entrenamiento</button>
  `;
}

function renderZ2Day(dateStr) {
  const week = getCurrentWeek();
  const prescription = CARDIO_PROGRESSION.z2.find(p => p.week === week) || CARDIO_PROGRESSION.z2[CARDIO_PROGRESSION.z2.length - 1];
  const draft = loadOrCreateDraft('z2', dateStr, () => ({ type_id: 'z2', date: dateStr, duration: '', avg_pace: '', rpe: '', notes: '' }));
  currentDraft = draft;
  saveDraft('z2', dateStr, draft);

  document.getElementById('day-content').innerHTML = `
    <div class="cardio-prescription">
      <div class="label">Plan de hoy · Semana ${week}</div>
      <div class="value">${prescription.duration} min Z2</div>
      <div class="meta">Conversacional · 65-75% FCmax · aire libre</div>
    </div>
    <div class="cardio-log-form">
      <div class="form-field"><label>Duración real (min)</label><input type="number" value="${draft.duration ?? ''}" placeholder="${prescription.duration}" onchange="updateCardio('duration', this.value)"></div>
      <div class="form-field"><label>Ritmo promedio km/h (opcional)</label><input type="number" step="0.1" value="${draft.avg_pace ?? ''}" onchange="updateCardio('avg_pace', this.value)"></div>
      <div class="form-field"><label>RPE 1-5</label><select onchange="updateCardio('rpe', this.value)"><option value="">—</option>${[1,2,3,4,5].map(r => `<option value="${r}" ${draft.rpe == r ? 'selected' : ''}>${r}</option>`).join('')}</select></div>
      <div class="form-field"><label>Notas (opcional)</label><input type="text" value="${draft.notes ?? ''}" onchange="updateCardio('notes', this.value)"></div>
    </div>
    <button class="btn" onclick="finishWorkout()">Finalizar entrenamiento</button>
  `;
}

function renderSimpleCardio(typeId, dateStr) {
  const draft = loadOrCreateDraft(typeId, dateStr, () => ({ type_id: typeId, date: dateStr, duration: '', rpe: '', notes: '' }));
  currentDraft = draft;
  saveDraft(typeId, dateStr, draft);

  document.getElementById('day-content').innerHTML = `
    <div class="cardio-log-form">
      <div class="form-field"><label>Duración (min)</label><input type="number" value="${draft.duration ?? ''}" onchange="updateCardio('duration', this.value)"></div>
      <div class="form-field"><label>RPE 1-5</label><select onchange="updateCardio('rpe', this.value)"><option value="">—</option>${[1,2,3,4,5].map(r => `<option value="${r}" ${draft.rpe == r ? 'selected' : ''}>${r}</option>`).join('')}</select></div>
      <div class="form-field"><label>Notas (opcional)</label><input type="text" value="${draft.notes ?? ''}" onchange="updateCardio('notes', this.value)"></div>
    </div>
    <button class="btn" onclick="finishWorkout()">Finalizar entrenamiento</button>
  `;
}

function updateCardio(field, val) {
  if (!currentDraft) return;
  currentDraft[field] = val;
  saveDraft(currentDayTypeId, currentDayDate, currentDraft);
}

function finishWorkout() {
  if (!currentDraft) return;
  const workouts = loadWorkouts();
  const filtered = workouts.filter(w => !(w.type_id === currentDraft.type_id && w.date === currentDraft.date));
  filtered.push({ ...currentDraft, completed_at: new Date().toISOString() });
  saveWorkouts(filtered);
  clearDraft(currentDayTypeId, currentDayDate);
  toast('¡Entrenamiento guardado!');
  setTimeout(() => showScreen('home'), 700);
}

// =============== ADD MANUAL EXERCISE ===============
function showAddExerciseModal() {
  document.getElementById('ex-name').value = '';
  document.getElementById('ex-primary').value = '';
  document.getElementById('ex-secondary').value = '';
  document.getElementById('modal-add-exercise').classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function saveManualExercise() {
  const name = document.getElementById('ex-name').value.trim();
  if (!name) { toast('Falta nombre'); return; }
  const primary = document.getElementById('ex-primary').value;
  const secondary = document.getElementById('ex-secondary').value;
  const id = 'user-' + name.toLowerCase().replace(/[^a-z0-9]+/g,'-') + '-' + Date.now();
  const ex = { id, name, primary: primary || '', secondary: secondary ? [secondary] : [], user_added: true };
  const arr = loadUserExercises();
  arr.push(ex);
  saveUserExercises(arr);
  closeModal('modal-add-exercise');
  // Auto-agregar al día actual si estamos en un día de fuerza
  if (currentDraft && currentDayTypeId && currentDayTypeId.startsWith('day')) {
    addExerciseToDay(id);
    toast('Ejercicio creado y agregado al día');
  } else {
    toast('Ejercicio agregado al catálogo');
  }
}

// =============== PICK EXERCISE ===============
function showPickExerciseModal() {
  document.getElementById('ex-search').value = '';
  filterPickExercises();
  document.getElementById('modal-pick-exercise').classList.add('open');
}
function filterPickExercises() {
  const q = (document.getElementById('ex-search').value || '').toLowerCase().trim();
  const all = getAllExercises();
  const filtered = q ? all.filter(e => e.name.toLowerCase().includes(q) || (e.primary || '').toLowerCase().includes(q)) : all;
  const html = filtered.map(e => `
    <div class="ex-pick-item" onclick="addExerciseToDay('${e.id}')">
      <div class="name">${e.name}</div>
      <div class="meta">${e.primary || '—'}${e.secondary && e.secondary.length ? ' · ' + e.secondary.join(', ') : ''}</div>
    </div>
  `).join('') || '<div class="empty">Sin resultados</div>';
  document.getElementById('ex-search-results').innerHTML = html;
}
function addExerciseToDay(exId) {
  if (!currentDraft) return;
  if (!currentDraft.exercise_order) currentDraft.exercise_order = [];
  if (!currentDraft.exercise_order.includes(exId)) {
    currentDraft.exercise_order.push(exId);
    if (!currentDraft.sets[exId]) currentDraft.sets[exId] = [{ set_number: 1, weight: '', reps: '', rpe: '' }];
    saveDraft(currentDayTypeId, currentDayDate, currentDraft);
  }
  closeModal('modal-pick-exercise');
  if (currentDraft.type_id && currentDraft.type_id.startsWith('day')) {
    renderStrengthDay(currentDayTypeId, currentDayDate);
  }
}

// =============== HISTORY ===============
function renderHistory() {
  const workouts = loadWorkouts().slice().sort((a,b) => b.date.localeCompare(a.date));
  const list = document.getElementById('history-list');
  if (!workouts.length) {
    list.innerHTML = '<div class="empty">Todavía no hay sesiones logueadas. ¡Vamos!</div>';
    return;
  }
  list.innerHTML = workouts.map(w => {
    const tpl = DAY_TEMPLATES.find(t => t.type_id === w.type_id);
    const d = new Date(w.date + 'T12:00:00');
    let stats = '';
    if (tpl && tpl.category === 'strength' && w.sets) {
      const totalSets = Object.values(w.sets).reduce((acc, arr) => acc + (arr || []).filter(s => s.reps).length, 0);
      const exCount = Object.keys(w.sets).filter(k => (w.sets[k] || []).some(s => s.reps)).length;
      stats = `${exCount} ejercicios · ${totalSets} sets`;
    } else if (w.duration) {
      stats = `${w.duration} min${w.rpe ? ' · RPE ' + w.rpe : ''}`;
    } else if (w.velocity) {
      stats = `${w.velocity} km/h · ${w.series_completed || '—'} series${w.rpe ? ' · RPE ' + w.rpe : ''}`;
    }
    return `
      <div class="history-item">
        <div class="history-date">${d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
        <div class="history-name">${tpl ? tpl.name : w.type_id}</div>
        <div class="history-stats">${stats}</div>
      </div>
    `;
  }).join('');
}

// =============== ANALYTICS ===============
let analyticsRange = 'week-mon';
document.querySelectorAll('.range-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.range-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    analyticsRange = p.dataset.range;
    renderAnalytics();
  });
});

function getRangeBounds(range) {
  const now = new Date();
  let start = new Date(now);
  start.setHours(0,0,0,0);
  if (range === 'week-mon') start = getWeekStart(now);
  else if (range === '7d') start.setDate(start.getDate() - 6);
  else if (range === 'month') start = new Date(now.getFullYear(), now.getMonth(), 1);
  else if (range === '30d') start.setDate(start.getDate() - 29);
  else if (range === 'ytd') start = new Date(now.getFullYear(), 0, 1);
  return { start, end: now };
}

function renderAnalytics() {
  const { start, end } = getRangeBounds(analyticsRange);
  const filtered = loadWorkouts().filter(w => {
    const d = new Date(w.date + 'T12:00:00');
    return d >= start && d <= end;
  });

  const sessionsCount = filtered.length;
  const totalVolume = filtered.reduce((acc, w) => {
    if (w.sets) {
      return acc + Object.values(w.sets).reduce((sa, arr) => sa + (arr || []).reduce((s, set) => s + ((+set.weight || 0) * (+set.reps || 0)), 0), 0);
    }
    return acc;
  }, 0);

  const allRpes = [];
  filtered.forEach(w => {
    if (w.sets) Object.values(w.sets).forEach(arr => (arr || []).forEach(s => { if (s.rpe) allRpes.push(+s.rpe); }));
    if (w.rpe) allRpes.push(+w.rpe);
  });
  const avgRpe = allRpes.length ? (allRpes.reduce((a,b) => a+b, 0) / allRpes.length).toFixed(1) : '—';
  const streak = computeStreak(loadWorkouts());

  document.getElementById('analytics-content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Sesiones</div><div class="stat-value">${sessionsCount}</div><div class="stat-meta">en el rango</div></div>
      <div class="stat-card accent"><div class="stat-label">Streak</div><div class="stat-value">${streak}</div><div class="stat-meta">${streak === 1 ? 'día' : 'días'} seguidos</div></div>
      <div class="stat-card accent-3"><div class="stat-label">Volumen</div><div class="stat-value">${Math.round(totalVolume).toLocaleString()}</div><div class="stat-meta">kg·rep</div></div>
      <div class="stat-card"><div class="stat-label">RPE promedio</div><div class="stat-value">${avgRpe}</div><div class="stat-meta">de 5</div></div>
    </div>
    <div class="chart-card"><h3>Volumen por grupo muscular</h3><div class="chart-container"><canvas id="chart-volume"></canvas></div></div>
    <div class="chart-card"><h3>Sesiones por tipo</h3><div class="chart-container"><canvas id="chart-types"></canvas></div></div>
  `;
  renderVolumeChart(filtered);
  renderTypesChart(filtered);
}

function computeStreak(workouts) {
  if (!workouts.length) return 0;
  const dates = new Set(workouts.map(w => w.date));
  let streak = 0;
  let d = new Date();
  d.setHours(0,0,0,0);
  if (!dates.has(dateToISO(d))) {
    d.setDate(d.getDate() - 1);
    if (!dates.has(dateToISO(d))) return 0;
  }
  while (dates.has(dateToISO(d))) {
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function renderVolumeChart(workouts) {
  const volumeByMuscle = {};
  workouts.forEach(w => {
    if (!w.sets) return;
    Object.entries(w.sets).forEach(([exId, sets]) => {
      const ex = findExercise(exId);
      if (!ex) return;
      const vol = (sets || []).reduce((s, set) => s + ((+set.weight || 0) * (+set.reps || 0)), 0);
      const m = ex.primary || 'Otro';
      volumeByMuscle[m] = (volumeByMuscle[m] || 0) + vol;
    });
  });
  const labels = Object.keys(volumeByMuscle);
  const data = labels.map(l => volumeByMuscle[l]);
  if (window._chartVolume) window._chartVolume.destroy();
  if (!labels.length) return;
  window._chartVolume = new Chart(document.getElementById('chart-volume'), {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: '#D4FF3D', borderRadius: 8 }] },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#A3A3A3' }, grid: { display: false } },
        y: { ticks: { color: '#A3A3A3' }, grid: { color: '#262626' } }
      }
    }
  });
}

function renderTypesChart(workouts) {
  const counts = {};
  workouts.forEach(w => {
    const tpl = DAY_TEMPLATES.find(t => t.type_id === w.type_id);
    const k = tpl ? tpl.short : w.type_id;
    counts[k] = (counts[k] || 0) + 1;
  });
  const labels = Object.keys(counts);
  const data = labels.map(l => counts[l]);
  const colors = ['#D4FF3D','#C5B5F5','#F5C8E0','#FAFAFA','#A3A3A3','#737373','#22C55E','#EF4444'];
  if (window._chartTypes) window._chartTypes.destroy();
  if (!labels.length) return;
  window._chartTypes = new Chart(document.getElementById('chart-types'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors.slice(0, labels.length) }] },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: '#FAFAFA', font: { size: 12 } } } }
    }
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

renderHome();
</script>
